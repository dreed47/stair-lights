esphome:
  name: stairlights
  friendly_name: StairLights

esp32:
  board: lolin_s2_mini
  framework:
    type: arduino

esp32_touch:
  setup_mode: false
  measurement_duration: 1ms  
  sleep_duration: 0.5ms     

logger:
  level: INFO
  logs:
    esp32_touch: ERROR

api:
  encryption:
    key: "APZrHqoNUsUds0Yg1z2ZE0pQV3Ka5jZInQDgnXsFt8E="

ota:
  - platform: esphome
    password: "c4cd1166b0949847f0890fbffeeb403f"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
