# ============================================================
# HOME ASSISTANT CONTROLLABLE SETTINGS
# ============================================================

number:
  - platform: template
    name: "Staircase Light Duration"
    id: light_duration
    icon: "mdi:timer-outline"
    unit_of_measurement: "seconds"
    min_value: 5
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    mode: slider

  - platform: template
    name: "Staircase LED Brightness"
    id: led_brightness
    icon: "mdi:brightness-5"
    unit_of_measurement: "%"
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    mode: slider

# ============================================================
# OUTPUT & LIGHT
# ============================================================

output:
  - platform: ledc
    pin: GPIO18
    id: mosfet_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    name: "Staircase LEDs"
    output: mosfet_pwm
    id: stair_leds

# ============================================================
# TOUCH SENSOR with Brightness & Duration Control
# ============================================================

binary_sensor:
  - platform: esp32_touch
    name: "Staircase Touch Pad"
    pin: GPIO1
    threshold: 1000000
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        # Turn ON with 0.8s fade at the configured brightness
        - light.turn_on:
            id: stair_leds
            transition_length: 0.8s
            brightness: !lambda "return id(led_brightness).state / 100.0;"
        # Wait for configured duration
        - delay: !lambda "return id(light_duration).state * 1000;"
        # Turn OFF with 4s fade
        - light.turn_off:
            id: stair_leds
            transition_length: 4s
