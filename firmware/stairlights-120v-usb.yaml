globals:
  - id: last_touch_time
    type: unsigned long
    initial_value: '0'
    restore_value: no
  - id: touch_cooldown_ms
    type: int
    initial_value: '6000'  # 6 second cooldown - covers the full power bounce
    restore_value: no

esphome:
  name: stairlights
  friendly_name: StairLights

esp32:
  board: lolin_s2_mini
  framework:
    type: arduino

esp32_touch:
  setup_mode: false
  measurement_duration: 1ms   
  sleep_duration: 0.5ms     
  

logger:
  level: INFO
  #logs:
