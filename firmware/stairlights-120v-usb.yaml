# ============================================================
# HOME ASSISTANT CONTROLLABLE SETTINGS
# ============================================================

number:
  - platform: template
    name: "Staircase Light Duration"
    id: light_duration
    icon: "mdi:timer-outline"
    unit_of_measurement: "seconds"
    min_value: 5
    max_value: 120
    step: 5
    initial_value: 30
    optimistic: true
    restore_value: true
    mode: slider

  - platform: template
    name: "Staircase LED Brightness"
    id: led_brightness
    icon: "mdi:brightness-5"
    unit_of_measurement: "%"
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    mode: slider

  - platform: template
    name: "Touch Threshold"
    id: touch_threshold_ui
    icon: "mdi:target-variant"
    min_value: 10000
    max_value: 500000      
    step: 5000
    initial_value: 180000  # Hardcoded default above the 149k power bounce
    optimistic: true
    mode: slider      
    on_value:
      then:
        - lambda: 'id(stair_touch).set_threshold(x);'


  - platform: template
    name: "Touch Filter On"
    id: touch_filter_on
    icon: "mdi:clock-start"
    unit_of_measurement: "ms"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 8
    optimistic: true
    mode: slider     

  - platform: template
    name: "Touch Filter Off"
    id: touch_filter_off
    icon: "mdi:clock-end"
    unit_of_measurement: "ms"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 50
    optimistic: true
    mode: slider     

# ============================================================
# OUTPUT & LIGHT
# ============================================================

output:
  - platform: ledc
    pin: GPIO18
    id: mosfet_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    name: "Staircase LEDs"
    output: mosfet_pwm
    id: stair_leds

# ============================================================
# LOGIC SCRIPT (With Power Supply Settle Lockout)
# ============================================================
script:
  - id: handle_stair_timer
    mode: restart  
    then:
      - delay: !lambda "return id(touch_filter_on).state;"
      
      - if:
          condition:
            binary_sensor.is_on: stair_touch
          then:
            - light.turn_on:
                id: stair_leds
                transition_length: 1s 
                brightness: !lambda "return id(led_brightness).state / 100.0;"
            
            - delay: !lambda "return id(light_duration).state * 1000;"
            
            - light.turn_off:
                id: stair_leds
                transition_length: 4s

# ============================================================
# TOUCH SENSOR
# ============================================================

binary_sensor:
  - platform: esp32_touch
    name: "Staircase Touch Pad"
    id: stair_touch
    pin: GPIO1
    threshold: 180000
    on_press:
      then:
        - lambda: |-
            unsigned long now = millis();
            // Only trigger if cooldown has expired
            if (now - id(last_touch_time) >= id(touch_cooldown_ms)) {
              id(last_touch_time) = now;
              id(handle_stair_timer).execute();
            }
            else {
              ESP_LOGD("cooldown", "Touch ignored - cooldown active (%lu ms remaining)", 
                       id(touch_cooldown_ms) - (now - id(last_touch_time)));
            }
